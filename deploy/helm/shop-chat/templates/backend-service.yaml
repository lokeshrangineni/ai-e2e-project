apiVersion: v1
kind: Service
metadata:
  name: {{ include "shop-chat.backend.fullname" . }}
  labels:
    {{- include "shop-chat.labels" . | nindent 4 }}
    {{- include "shop-chat.backend.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "shop-chat.backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
