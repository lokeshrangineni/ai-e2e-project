{{/*
  This template documents the GCP credentials Secret that must be created
  manually before deploying. The Helm chart only references the secret by name
  (gcpCredentialsSecretName) — it does NOT create it, to avoid committing
  credentials to source control.

  Create the secret before running `helm install`:

  For demo (using local Application Default Credentials):
    oc create secret generic gcp-vertex-credentials \
      --from-file=sa-key.json=$HOME/.config/gcloud/application_default_credentials.json \
      -n <namespace>

  For production (using a dedicated service account key):
    oc create secret generic gcp-vertex-credentials \
      --from-file=sa-key.json=/path/to/sa-key.json \
      -n <namespace>
*/}}
{{- $secretName := .Values.gcpCredentialsSecretName }}
{{- if not $secretName }}
  {{- fail "values.gcpCredentialsSecretName must be set — see deploy/helm/shop-chat/templates/gcp-secret.yaml for instructions" }}
{{- end }}
