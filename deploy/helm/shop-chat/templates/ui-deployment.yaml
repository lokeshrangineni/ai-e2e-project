apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shop-chat.ui.fullname" . }}
  labels:
    {{- include "shop-chat.labels" . | nindent 4 }}
    {{- include "shop-chat.ui.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      {{- include "shop-chat.ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shop-chat.labels" . | nindent 8 }}
        {{- include "shop-chat.ui.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            # nginx proxies /api/* to this URL inside the cluster
            - name: BACKEND_URL
              value: "http://{{ include "shop-chat.backend.fullname" . }}:8000"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
