{{- if or .Values.langfuse.publicKey .Values.langfuse.secretKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shop-chat.backend.fullname" . }}-secrets
  labels:
    {{- include "shop-chat.labels" . | nindent 4 }}
type: Opaque
stringData:
  LANGFUSE_PUBLIC_KEY: {{ .Values.langfuse.publicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.langfuse.secretKey | quote }}
{{- end }}
