# KB Articles — Help Center retrieval works correctly
# These test cases verify the agent uses KB tools for policy and help questions.

- id: kb_return_policy
  description: Customer asks how to return an item
  input: "How do I return an item I bought?"
  context:
    role: customer
    user_id: cust_001
    user_name: Alice Johnson
  expect:
    blocked: false
    tools_called:
      - search_kb_articles
    output_contains_any:
      - "30 days"
      - "return"
      - "refund"
      - "My Orders"
    output_not_contains:
      - "Blocked by"
      - "cannot help"

