# nginx configuration for shop-ui
# BACKEND_URL is substituted at container startup via envsubst

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Write logs to stdout/stderr for OpenShift log aggregation
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Temp directories that non-root can write to
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    sendfile on;
    keepalive_timeout 65;
    gzip on;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Proxy /api/* to the backend service
        # Strip /api prefix before forwarding
        location /api/ {
            proxy_pass ${BACKEND_URL}/;

            # SSE (Server-Sent Events) requires these settings
            proxy_buffering           off;
            proxy_cache               off;
            proxy_read_timeout        300s;
            proxy_connect_timeout     10s;
            proxy_send_timeout        300s;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required for SSE
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # SPA fallback — all non-file paths return index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
